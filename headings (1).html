<title>Headings</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding: 40px 16px; margin: 0; }
  .card { background: #fff; border-radius: 12px; padding: 36px 40px; box-shadow: 0 4px 16px rgba(0,0,0,.08); max-width: 480px; width: 100%; }
  h1 { font-size: 2rem; color: #1e293b; margin: 0 0 24px; border-bottom: 3px solid #6366f1; padding-bottom: 12px; }
  h2 { font-size: 1.2rem; color: #6366f1; margin: 20px 0 6px; }
  p  { font-size: .9rem; color: #64748b; margin: 0 0 4px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <h1>Create Account</h1>

</html>
